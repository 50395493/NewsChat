format_version: '11'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: android

app:
  envs:
  - OPTIONAL_CONFIG: "value"

workflows:
  primary:
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@6: {}
    - cache-pull@2: {}
    - script@1:
        title: 环境检查
        inputs:
        - content: |
            #!/bin/bash
            echo "=== 伪装新闻聊天APK构建 ==="
            echo "项目: Stealth News Chat"
            echo "功能: 新闻聚合 + 私密聊天"
            java -version
            ./gradlew --version
    - android-build@1:
        inputs:
        - project_location: $BITRISE_SOURCE_DIR
        - module: app
        - variant: debug
    - cache-push@2: {}
    - deploy-to-bitrise-io@2: {}

meta:
  bitrise.io:
    stack: linux-docker-android-20.04
    machine_type_id: elite-m

trigger_map:
- push_branch: '*'
  workflow: primary
- pull_request_source_branch: '*'
  workflow: primary