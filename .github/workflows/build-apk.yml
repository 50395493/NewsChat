name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4  # 如果有更新版本就升级
    
    - name: Setup Java
      uses: actions/setup-java@v4  # 如果有更新版本就升级
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2  # 检查是否有 v3 版本
    
    - name: Build Android Project
      run: ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4  # 如果有更新版本就升级
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk
