name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Debug - Show all files
      run: |
        echo "=== Current directory ==="
        ls -la
        echo ""
        echo "=== .github directory ==="
        ls -la .github/ 2>/dev/null || echo "No .github"
        echo ""
        echo "=== .github/workflows ==="
        ls -la .github/workflows/ 2>/dev/null || echo "No workflows"
        echo ""
        echo "=== Kotlin source files ==="
        find . -name "*.kt" -type f 2>/dev/null || echo "No Kotlin files"
        echo ""
        echo "=== Gradle files ==="
        find . -name "*.gradle" -type f 2>/dev/null || echo "No Gradle files"
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
    
    - name: Prepare Gradle
      run: |
        chmod +x ./gradlew
        if [ ! -f "gradle/wrapper/gradle-wrapper.jar" ]; then
          echo "Downloading Gradle wrapper..."
          ./gradlew wrapper --gradle-version 8.4
        fi
    
    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_HOME" > local.properties
    
    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace
      env:
        CI: true
        JAVA_OPTS: -Xmx2048m
    
    - name: Verify APK exists
      run: |
        echo "=== Checking for APK ==="
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "✅ SUCCESS: APK found!"
          ls -lh app/build/outputs/apk/debug/app-debug.apk
        else
          echo "❌ FAIL: APK not found"
          echo "=== Checking build directory ==="
          find app/build -type f 2>/dev/null | head -30
          echo "=== Build outputs ==="
          ls -la app/build/outputs/ 2>/dev/null || echo "No outputs dir"
        fi
    
    - name: Upload APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: stealth-news-chat-apk
        path: app/build/outputs/apk/debug/app-debug.apk
    
    - name: Upload logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          app/build/outputs/
          gradle/build/
        retention-days: 7
